# pvuv.ai — scoring configuration (EXAMPLE)
#
# Copy to `config.local.toml` (gitignored) and tune privately.
# The scoring engine reads weights/thresholds from here, not from hardcoded
# values, so you can adjust detection WITHOUT exposing your tuning to
# fraudsters. The values below are conservative starting defaults, not
# production-tuned. See PROJECT_PLAN.md §6 and §21.
#
# NOTE: This file contains NO secrets. Secrets (HMAC_KEY, AI_API_KEY, etc.)
# go through `wrangler secret put`, never into any file.

# ------------------------------------------------------------------
# Verdict bands — bot_score (0–100) maps to a verdict
# ------------------------------------------------------------------
[bands]
clean_max   = 29     # 0..29   -> clean
suspect_max = 69     # 30..69  -> suspect
# 70..100 -> bot
# verified crawlers are classified separately, regardless of score

# ------------------------------------------------------------------
# Signal weights — added to bot_score when the signal fires.
# "hard" signals force score = 100 (definitive bot).
# Negative values are trust credits (subtracted).
# Bit values correspond to bot_flags (see shared/flags.ts).
# ------------------------------------------------------------------
[weights]
webdriver              = "hard"   # 0x0001 navigator.webdriver === true
automation_residue     = "hard"   # 0x0002 _phantom / __nightmare / $cdc_* / callPhantom
ua_clienthints_mismatch = 25      # 0x0004 UA vs Sec-CH-UA contradiction
datacenter_asn         = 35       # 0x0008 request from a hosting/datacenter ASN
sec_fetch_missing      = 25       # 0x0010 Sec-Fetch-* headers absent
timezone_ip_mismatch   = 20       # 0x0020 JS timezone vs IP geo / cf.timezone
zero_interaction_noleave = 20     # 0x0040 no interaction AND no page_leave
software_webgl         = 15       # 0x0080 SwiftShader / llvmpipe / Mesa OffScreen
mechanical_timing      = 15       # 0x0100 near-zero inter-event interval CV
blocklist_cluster      = 40       # 0x0200 matches a KV-blocklisted cluster
honeypot               = "hard"   # 0x0400 hidden honeypot link followed
screen_device_mismatch = 10       # 0x0800 per contradiction (screen / touch / cores)
mobile_no_motion       = 15       # 0x1000 mobile UA but no motion data (Android)
motion_static          = 10       # 0x2000 accel-incl-gravity perfectly constant
search_ref_datacenter  = 35       # 0x4000 search-engine referrer from a datacenter ASN (stacks with datacenter_asn → bot)
forged_search_referrer = 40       # 0x8000 implausible search-engine referrer (http / ?q= leak / Sec-Fetch contradiction)

[trust_credits]
# Subtracted from bot_score (make legit traffic look cleaner).
residential_or_mobile_asn = 10
has_interaction           = 10
has_page_leave            = 10

# ------------------------------------------------------------------
# Dashboard "unreasonable data" alerts — self-contained plausibility
# checks over the selected period (no external baseline). Each is a
# fraction (0..1) or a raw ratio; a check fires when the measured value
# crosses it. min_pageviews mutes small samples.
# ------------------------------------------------------------------
[alerts]
min_pageviews          = 50      # below this many pageviews, stay silent
invalid_share          = 0.30    # (bot+suspect)/pageviews above this → alert
datacenter_share       = 0.25    # datacenter-ASN pageviews / pageviews
fake_search_share      = 0.10    # forged/fake search-referrer pageviews / pageviews
zero_interaction_share = 0.40    # no-interaction pageviews / pageviews
bounce_low             = 0.05    # single-page bounce BELOW this is implausibly low
pages_per_visitor_high = 15      # pageviews/visitor above this = scraping-like
source_concentration   = 0.60    # a single non-direct source's session share

# ------------------------------------------------------------------
# Baseline anomaly detection (daily cron): compares yesterday against a
# trailing per-day baseline from the rollups and flags large deviations
# (traffic spikes/drops, invalid-share jumps, per-source surges).
# ------------------------------------------------------------------
[anomaly]
baseline_days = 14      # trailing window length (days before yesterday)
min_days      = 5       # need at least this many baseline days to judge
spike_ratio   = 3.0     # yesterday >= baseline mean × this → spike
drop_ratio    = 0.34    # yesterday <= baseline mean × this → drop
min_pv        = 100     # site-level: ignore days below this many pageviews
min_source_uv = 30      # source-level: ignore sources below this baseline visitors
invalid_jump  = 0.15    # invalid-traffic share must rise by ≥ this many points

# ------------------------------------------------------------------
# Detection toggles
# ------------------------------------------------------------------
[detection]
expensive_checks_enabled   = true   # canvas/WebGL via requestIdleCallback
expensive_checks_sample    = 1.0    # 0.0–1.0 sampling rate for expensive checks
mobile_sensors_enabled     = true   # Android-only, passive, coarse (see §4.6)
honeypot_enabled           = true

# ------------------------------------------------------------------
# Population / batch analysis thresholds (daily Cron)
# ------------------------------------------------------------------
[population]
fp_cluster_min_visitors    = 20     # fp_hash shared by >= N visitor_ids -> flag
ip24_share_threshold       = 0.30   # a /24 contributing >= 30% of site traffic -> flag
ip24_min_events            = 100    # ...but only when the /24 sent >= N pageviews (small sites: noise guard)
cookie_reset_min_visitors  = 10     # same fp+/24 cycling through >= N one-shot visitor_ids -> cookie-reset farm
cookie_reset_epv_max       = 1.5    # ...where avg events per visitor_id <= this ("each appearing once")
interval_cv_bot_ceiling    = 0.20   # per-visitor interval CV <= this -> mechanical
interval_min_n             = 20     # ...only judged once a visitor has >= N measured intervals
max_clusters_per_run       = 50     # safety cap: top-N clusters (by members) re-verdicted per daily run
path_signature_min_count   = 50     # identical path+dwell signature repeated >= N -> flag (M3)
baseline_deviation_sigma   = 4.0    # MAD-based deviation to raise an anomaly (M3)

# ------------------------------------------------------------------
# Cross-site blocklist behavior
# ------------------------------------------------------------------
[blocklist]
default_ttl_days           = 14     # entries expire unless refreshed by new evidence
hard_signal_permanent      = true   # webdriver/automation/honeypot -> no expiry
share_bare_ip              = false  # prefer fingerprint+behavior over raw IP (CGNAT safety)

# ------------------------------------------------------------------
# Ad protection (adguard) defaults — per-site owners can override
# ------------------------------------------------------------------
[adguard]
default_mode               = "balanced"  # off | loose | balanced | strict | custom
verdict_timeout_ms         = 300         # /v timeout; on timeout -> fail-open (load ads)
shadow_days                = 7           # new sites: record-only before enforcing

# ------------------------------------------------------------------
# Data retention
# ------------------------------------------------------------------
[retention]
raw_events_days            = 90     # raw events kept for drill-down; older -> aggregates only
