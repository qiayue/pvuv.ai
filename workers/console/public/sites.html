<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sites — pvuv.ai</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.5 system-ui, sans-serif; background: #0f1115; color: #e6e8eb; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; border-bottom: 1px solid #262b36; }
  header b { font-size: 17px; }
  header button { background: none; border: 1px solid #313847; color: #8b93a1; border-radius: 6px; padding: 5px 12px; cursor: pointer; }
  main { max-width: 960px; margin: 28px auto; padding: 0 16px; }
  h2 { font-size: 16px; margin: 26px 0 10px; }
  .head { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .head h2 { margin: 0; }
  .toolbar { display: flex; align-items: center; gap: 8px; }
  .toolbar select, .btn { height: 30px; border: 1px solid #313847; border-radius: 7px; background: #171a21; color: #cdd3dc;
                          font: inherit; font-size: 13px; cursor: pointer; }
  .toolbar select { padding: 0 8px; }
  .btn { padding: 0 12px; display: inline-flex; align-items: center; gap: 5px; font-weight: 600; }
  .btn:hover { background: #1d222c; border-color: #3b4457; color: #e6e8eb; }
  .btn.primary { background: #2563eb; border-color: #2563eb; color: #fff; }
  .btn.primary:hover { background: #1d4ed8; }
  .btn.icon { width: 30px; padding: 0; justify-content: center; font-size: 15px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-top: 14px; }
  .scard { display: block; background: #171a21; border: 1px solid #262b36; border-radius: 10px; padding: 16px; text-decoration: none; color: inherit; }
  .scard:hover { border-color: #3b4457; background: #191d26; }
  .scard .name { font-weight: 700; font-size: 15px; }
  .scard .dom { color: #8b93a1; font-size: 12px; margin-top: 2px; word-break: break-all; }
  .scard .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 14px; }
  .scard .stat .v { font-size: 19px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .scard .stat .k { color: #8b93a1; font-size: 11px; }
  .scard .foot { color: #8b93a1; font-size: 11.5px; margin-top: 12px; display: flex; justify-content: space-between; }
  .scard .badge { color: #6ee7a0; }
  .panel { margin-top: 16px; background: #171a21; border: 1px solid #262b36; border-radius: 10px; padding: 18px; }
  .panel[hidden] { display: none; }
  .panel .phead { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .panel .phead h3 { margin: 0; font-size: 14px; }
  .panel .close { background: none; border: 0; color: #8b93a1; font-size: 18px; line-height: 1; cursor: pointer; padding: 2px 6px; }
  .panel .close:hover { color: #e6e8eb; }
  form.create { display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }
  form.create label { font-size: 13px; color: #8b93a1; display: block; }
  form.create input, form.create select { width: 100%; padding: 8px 9px; margin-top: 3px; border-radius: 6px; border: 1px solid #313847;
                background: #0f1115; color: inherit; font: inherit; }
  form.create button { grid-column: span 2; justify-self: start; padding: 8px 18px; border: 0; border-radius: 7px; background: #2563eb; color: #fff; font-weight: 600; cursor: pointer; }
  .full { grid-column: span 2; }
  .snippet { display: none; margin-top: 14px; background: #0c1117; border: 1px solid #2b3a2e; border-radius: 8px; padding: 14px; }
  .snippet pre { margin: 8px 0 0; white-space: pre-wrap; word-break: break-all; font-size: 12.5px; color: #9ece9e; }
  .err { color: #f87171; font-size: 13px; grid-column: span 2; min-height: 1em; margin: 0; }
  @media (max-width: 560px) { form.create { grid-template-columns: 1fr; } form.create button, .err, .full { grid-column: span 1; } }
</style>
</head>
<body>
<header><b>pvuv.ai</b><a href="/health.html" style="color:#7ab3ff;text-decoration:none;font-size:13px">Self-check</a><button id="logout" style="margin-left:auto">Sign out</button></header>
<main>
  <div class="head">
    <h2>Your sites</h2>
    <div class="toolbar">
      <select id="period" aria-label="Date range">
        <optgroup label="Rolling">
          <option value="24h" selected>Last 24 hours</option>
          <option value="today">Today</option>
          <option value="7d">Last 7 days</option>
          <option value="30d">Last 30 days</option>
          <option value="90d">Last 90 days</option>
        </optgroup>
        <optgroup label="Calendar">
          <option value="yesterday">Yesterday</option>
          <option value="this_week">This week</option>
          <option value="last_week">Last week</option>
          <option value="this_month">This month</option>
          <option value="last_month">Last month</option>
          <option value="this_year">This year</option>
        </optgroup>
      </select>
      <button class="btn primary" id="btnAdd">＋ New site</button>
      <button class="btn icon" id="btnSettings" title="Homepage settings" aria-label="Homepage settings">⚙</button>
    </div>
  </div>
  <div id="sites">loading…</div>

  <section class="panel" id="addPanel" hidden>
    <div class="phead"><h3>Add a site</h3><button class="close" data-close="addPanel" aria-label="Close">×</button></div>
    <form class="create" id="create">
      <div><label>Site name<input id="name" required placeholder="My Blog"></label></div>
      <div><label>Domains (comma-separated)<input id="domains" required placeholder="example.com, www.example.com"></label></div>
      <div><label>Ad protection mode
        <select id="agmode"><option value="off">off</option><option value="loose">loose</option>
          <option value="balanced">balanced</option><option value="strict">strict</option></select></label></div>
      <div><label>AdSense client (optional)<input id="adclient" placeholder="ca-pub-1234567890123456"></label></div>
      <div><label>Timezone <span style="color:#e0a34a">(can't be changed later)</span>
        <select id="tz"></select></label></div>
      <div><label>Engagement threshold (seconds)
        <input id="engaged" type="number" min="1" max="300" value="15" placeholder="15">
        <span style="color:#8b93a1;font-size:12px">a visit is "engaged" (not a bounce) after this dwell time. GA4 default 10s; we default 15s.</span>
      </label></div>
      <p class="err" id="err"></p>
      <button type="submit">Create site</button>
    </form>
    <div class="snippet" id="snippet">
      <b>Site created — embed this snippet:</b>
      <pre id="snippetCode"></pre>
      <p style="color:#8b93a1;font-size:12px;margin:8px 0 0">
        data-api must point at your ingest host — adjust it if yours is not
        in.&lt;your-domain&gt;. See DEPLOY.md.
      </p>
    </div>
  </section>

  <section class="panel" id="homePanel" hidden>
    <div class="phead"><h3>Homepage settings</h3><button class="close" data-close="homePanel" aria-label="Close">×</button></div>
    <form class="create" id="homeSettings">
      <div class="full"><label>Site name (shown on your public homepage)<input id="hsName" maxlength="100" placeholder="Web analytics"></label></div>
      <div class="full"><label>Description<input id="hsDesc" maxlength="500" placeholder="This site runs a self-hosted analytics instance."></label></div>
      <p class="err" id="hsMsg"></p>
      <button type="submit">Save</button>
    </form>
    <form class="create" id="tzSettings" style="margin-top:16px;border-top:1px solid #262b36;padding-top:16px">
      <div class="full"><label>Default timezone for new sites
        <select id="tzDefault"></select></label></div>
      <p class="err" id="tzMsg"></p>
      <button type="submit">Save default timezone</button>
    </form>
  </section>
</main>
<script>
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
async function guard(r) { if (r.status === 401) { location.href = '/login.html'; throw new Error('auth'); } return r; }

// collapsible panels: only one open at a time; toolbar buttons toggle them
function togglePanel(id) {
  for (const p of ['addPanel', 'homePanel']) {
    const el = document.getElementById(p);
    if (p === id) el.hidden = !el.hidden;
    else el.hidden = true;
  }
  const opened = document.getElementById(id);
  if (!opened.hidden) opened.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
document.getElementById('btnAdd').addEventListener('click', () => togglePanel('addPanel'));
document.getElementById('btnSettings').addEventListener('click', () => togglePanel('homePanel'));
document.querySelectorAll('.panel .close').forEach((b) =>
  b.addEventListener('click', () => { document.getElementById(b.dataset.close).hidden = true; }));

const fmt = (n) => n == null ? '–' : Number(n).toLocaleString('en-US');
const dur = (ms) => ms == null ? '–' : ms >= 60000 ? Math.floor(ms/60000)+'m '+Math.round(ms%60000/1000)+'s' : Math.round((ms||0)/1000)+'s';

async function loadSites() {
  const period = document.getElementById('period').value;
  const r = await guard(await fetch('/api/sites'));
  const { sites } = await r.json();
  const el = document.getElementById('sites');
  if (!sites.length) { el.innerHTML = '<p style="color:#8b93a1">No sites yet — add one below.</p>'; return; }

  // one card per site, each showing its own overview so all sites' numbers
  // are visible at a glance on this page; click a card for the full dashboard
  el.innerHTML = '<div class="cards">' + sites.map((s) => `
    <a class="scard" href="/site.html?id=${esc(s.site_id)}" data-id="${esc(s.site_id)}">
      <div class="name">${esc(s.name)}</div>
      <div class="dom">${esc(JSON.parse(s.allowed_domains).join(', '))}</div>
      <div class="stats" id="st-${esc(s.site_id)}">
        <div class="stat"><div class="v">…</div><div class="k">Pageviews</div></div>
        <div class="stat"><div class="v">…</div><div class="k">Visitors</div></div>
        <div class="stat"><div class="v">…</div><div class="k">Sessions</div></div>
      </div>
      <div class="foot"><span>${esc(s.timezone || 'UTC')} · adguard: ${esc(s.adguard_mode)}</span><span class="badge" id="hs-${esc(s.site_id)}"></span></div>
    </a>`).join('') + '</div>';

  // fetch each site's overview in parallel and fill its card
  await Promise.all(sites.map(async (s) => {
    try {
      const o = await (await fetch(`/api/sites/${s.site_id}/overview?period=${period}`)).json();
      const human = o.pv ? (((o.clean_count + o.suspect_count) / o.pv) * 100).toFixed(0) : 0;
      document.getElementById('st-' + s.site_id).innerHTML = `
        <div class="stat"><div class="v">${fmt(o.pv)}</div><div class="k">Pageviews</div></div>
        <div class="stat"><div class="v">${fmt(o.uv)}</div><div class="k">Visitors</div></div>
        <div class="stat"><div class="v">${fmt(o.sessions)}</div><div class="k">Sessions</div></div>`;
      document.getElementById('hs-' + s.site_id).textContent = o.pv ? human + '% human' : 'no data yet';
    } catch {
      document.getElementById('hs-' + s.site_id).textContent = '';
    }
  }));
}
// remember the sites-overview period across refreshes (default: last 24h)
(() => {
  const sel = document.getElementById('period');
  const saved = localStorage.getItem('pvuv.sitesPeriod');
  if (saved && [...sel.options].some((o) => o.value === saved)) sel.value = saved;
})();
document.getElementById('period').addEventListener('change', () => {
  localStorage.setItem('pvuv.sitesPeriod', document.getElementById('period').value);
  loadSites();
});

// --- timezones -------------------------------------------------------------
const TZ_LIST = (() => {
  try { return Intl.supportedValuesOf('timeZone'); } catch {
    return ['UTC','Asia/Shanghai','Asia/Hong_Kong','Asia/Tokyo','Asia/Singapore','Asia/Kolkata',
            'Europe/London','Europe/Paris','Europe/Berlin','America/New_York','America/Chicago',
            'America/Los_Angeles','America/Sao_Paulo','Australia/Sydney'];
  }
})();
const browserTz = (() => { try { return Intl.DateTimeFormat().resolvedOptions().timeZone; } catch { return 'UTC'; } })();
function fillTzSelect(sel, selected) {
  sel.innerHTML = TZ_LIST.map((z) => `<option value="${esc(z)}"${z === selected ? ' selected' : ''}>${esc(z)}</option>`).join('');
}
let userTz = 'UTC';
async function loadUserTz() {
  try { userTz = (await (await fetch('/api/me')).json()).timezone || browserTz || 'UTC'; } catch { userTz = browserTz || 'UTC'; }
  if (!TZ_LIST.includes(userTz)) userTz = 'UTC';
  fillTzSelect(document.getElementById('tz'), userTz);            // new-site form default
  fillTzSelect(document.getElementById('tzDefault'), userTz);     // settings panel
}
document.getElementById('tzSettings').addEventListener('submit', async (e) => {
  e.preventDefault();
  const tz = document.getElementById('tzDefault').value;
  const r = await guard(await fetch('/api/settings/timezone', {
    method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ timezone: tz }),
  }));
  const el = document.getElementById('tzMsg');
  if (r.ok) { userTz = tz; fillTzSelect(document.getElementById('tz'), tz); el.style.color = '#6ee7a0'; el.textContent = 'saved'; }
  else { el.style.color = ''; el.textContent = 'save failed'; }
});

document.getElementById('create').addEventListener('submit', async (e) => {
  e.preventDefault();
  const body = {
    name: document.getElementById('name').value,
    domains: document.getElementById('domains').value.split(',').map((d) => d.trim()).filter(Boolean),
    adguard_mode: document.getElementById('agmode').value,
    adclient: document.getElementById('adclient').value.trim() || undefined,
    timezone: document.getElementById('tz').value,
    engaged_seconds: parseInt(document.getElementById('engaged').value, 10) || 15,
  };
  const r = await guard(await fetch('/api/sites', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(body) }));
  const data = await r.json();
  if (!r.ok) { document.getElementById('err').textContent = data.error || 'failed'; return; }
  document.getElementById('err').textContent = '';
  // src: f.js as hosted by this console deployment (DEPLOY.md step 8);
  // data-api: ingest host, assumed in.<apex> per the reference layout —
  // deployers adjust if theirs differs (the SDK default is in.pvuv.ai).
  const apex = location.hostname.replace(/^(www|console)\./, '');
  const attrs = [`data-site="${data.site_id}"`, `data-api="https://in.${apex}"`];
  if (data.adguard_mode !== 'off') attrs.push(`data-adguard="${data.adguard_mode}"`);
  if (data.adclient) attrs.push(`data-adclient="${data.adclient}"`);
  document.getElementById('snippetCode').textContent =
    `<script defer src="${location.origin}/f.js"\n        ${attrs.join('\n        ')}><\/script>`;
  document.getElementById('snippet').style.display = 'block';
  loadSites();
});

document.getElementById('logout').addEventListener('click', async () => {
  await fetch('/api/logout', { method: 'POST' });
  location.href = '/login.html';
});

async function loadHomeSettings() {
  const r = await fetch('/api/home');
  if (!r.ok) return;
  const { name, description } = await r.json();
  document.getElementById('hsName').value = name || '';
  document.getElementById('hsDesc').value = description || '';
}
document.getElementById('homeSettings').addEventListener('submit', async (e) => {
  e.preventDefault();
  const r = await guard(await fetch('/api/settings', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({
      name: document.getElementById('hsName').value,
      description: document.getElementById('hsDesc').value,
    }),
  }));
  const el = document.getElementById('hsMsg');
  el.style.color = r.ok ? '#6ee7a0' : '';
  el.textContent = r.ok ? 'saved — view your homepage at /' : 'save failed';
});

loadSites();
loadHomeSettings();
loadUserTz();
</script>
</body>
</html>
