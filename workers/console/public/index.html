<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Web analytics</title>
<!--
  Default homepage for a self-hosted pvuv.ai deployment.

  Deliberately minimal and generic: thousands of deployments shipping
  identical rich landing copy would be duplicate content in search engines,
  so this page says almost nothing — customize it freely for your own
  deployment. The footer attribution links must stay on this homepage in
  free deployments (see README "Attribution", AGPL-3.0 §7(b) additional term).
-->
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 16px/1.6 system-ui, sans-serif; background: #0f1115; color: #e6e8eb;
         min-height: 100vh; display: grid; grid-template-rows: 1fr auto; }
  main { display: grid; place-items: center; padding: 40px 16px; }
  .box { max-width: 480px; text-align: center; }
  h1 { font-size: 26px; margin: 0 0 10px; }
  p { color: #8b93a1; margin: 0 0 26px; }
  a.btn { display: inline-block; padding: 10px 26px; border-radius: 8px; background: #3b82f6;
          color: #fff; text-decoration: none; font-weight: 600; }
  a.btn:hover { background: #2f6fd6; }
  footer { padding: 18px; text-align: center; font-size: 12.5px; color: #8b93a1;
           border-top: 1px solid #1d222c; }
  footer a { color: #8b93a1; }
</style>
</head>
<body>
<main>
  <div class="box">
    <h1>Web analytics</h1>
    <p>This site runs a self-hosted analytics instance.</p>
    <a class="btn" href="/login.html">Sign in</a>
  </div>
</main>
<footer>
  Powered by <a href="https://pvuv.ai">pvuv.ai</a> ·
  <a href="https://github.com/qiayue/pvuv.ai">open source</a>
</footer>
</body>
</html>
