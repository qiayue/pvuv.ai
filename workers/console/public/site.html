<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard — pvuv.ai</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 system-ui, sans-serif; background: #0f1115; color: #e6e8eb; }
  header { display: flex; align-items: center; gap: 14px; padding: 14px 24px; border-bottom: 1px solid #262b36; }
  header a { color: #7ab3ff; text-decoration: none; }
  header b { font-size: 16px; }
  header select { margin-left: auto; background: #171a21; color: inherit; border: 1px solid #313847; border-radius: 6px; padding: 5px 8px; }
  main { max-width: 1060px; margin: 22px auto; padding: 0 16px; }
  h2 { font-size: 15px; margin: 26px 0 10px; color: #aeb6c2; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
  .card { background: #171a21; border: 1px solid #262b36; border-radius: 8px; padding: 12px 16px; }
  .card .v { font-size: 22px; font-weight: 700; }
  .card .k { color: #8b93a1; font-size: 12px; }
  .card .h { color: #6b7280; font-size: 11px; margin-top: 2px; }
  .panel { background: #171a21; border: 1px solid #262b36; border-radius: 8px; padding: 14px 16px; overflow-x: auto; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 800px) { .grid2 { grid-template-columns: 1fr; } }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: #8b93a1; font-weight: 500; padding: 5px 8px; border-bottom: 1px solid #262b36; }
  td { padding: 5px 8px; border-bottom: 1px solid #1d222c; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  .badge { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 12px; }
  .b-clean { background: #14331f; color: #6ee7a0; } .b-suspect { background: #33290f; color: #fbbf24; }
  .b-bot { background: #331414; color: #f87171; } .b-crawler { background: #1d2733; color: #93b4d6; }
  .flags { color: #8b93a1; font-size: 12px; }
  svg text { fill: #8b93a1; font-size: 10px; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; font-size: 12.5px; color: #aeb6c2; margin-top: 8px; }
  .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 5px; }
  .muted { color: #8b93a1; }
  tr.clickable { cursor: pointer; }
  tr.clickable:hover { background: #1d2230; }
  .drill { color: #8b93a1; font-size: 11px; opacity: 0.35; }
  tr.clickable:hover .drill { opacity: 1; }
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 20px; }
  .modal[hidden] { display: none; }
  .modal-box { background: #171a21; border: 1px solid #313847; border-radius: 10px; width: 660px; max-width: 100%; max-height: 82vh; display: flex; flex-direction: column; }
  .modal-head { display: flex; align-items: center; gap: 10px; padding: 13px 16px; border-bottom: 1px solid #262b36; }
  .modal-head b { font-size: 14px; }
  .modal-x { margin-left: auto; background: none; border: 0; color: #8b93a1; font-size: 22px; line-height: 1; cursor: pointer; }
  .modal-body { padding: 10px 16px 16px; overflow: auto; }
  .modal-body a { color: #7ab3ff; text-decoration: none; word-break: break-all; }
  .gbtn { display: inline-block; margin: 14px 2px 0; padding: 8px 13px; border: 1px solid #313847; border-radius: 8px; font-size: 13px; }
  .gbtn:hover { background: #1d2230; border-color: #3b4457; }
  .switcher { position: relative; }
  .title-btn { font: 700 16px system-ui, sans-serif; color: #e6e8eb; background: none; border: 0; cursor: pointer; padding: 4px 8px; border-radius: 6px; display: inline-flex; align-items: center; gap: 7px; }
  .title-btn:hover { background: #171a21; }
  .title-btn .caret { color: #8b93a1; font-size: 11px; font-weight: 400; }
  .switch-pop { position: absolute; top: 100%; left: 0; margin-top: 6px; width: 300px; max-width: 80vw; background: #171a21; border: 1px solid #313847; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,.45); z-index: 30; padding: 8px; }
  .switch-pop input { width: 100%; box-sizing: border-box; background: #0f1115; color: inherit; border: 1px solid #313847; border-radius: 6px; padding: 7px 9px; font: inherit; margin-bottom: 6px; }
  .switch-pop ul { list-style: none; margin: 0; padding: 0; max-height: 320px; overflow-y: auto; }
  .switch-pop li { padding: 7px 9px; border-radius: 6px; cursor: pointer; display: flex; flex-direction: column; gap: 1px; }
  .switch-pop li:hover, .switch-pop li.active { background: #222834; }
  .switch-pop li .nm { font-weight: 600; }
  .switch-pop li.current .nm::after { content: ' ✓'; color: #7ab3ff; }
  .switch-pop li .dm { color: #8b93a1; font-size: 12px; }
  .switch-pop .none { color: #8b93a1; padding: 8px 9px; font-size: 13px; }
  .rt { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; color: #aeb6c2; font-size: 13px; }
  .shadow-banner { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; padding: 10px 14px; border: 1px solid #4a3f1e; background: #241f10; color: #e8d9a0; border-radius: 8px; font-size: 13px; }
  .shadow-banner[hidden] { display: none; }
  .shadow-banner .enforce { margin-left: auto; background: #b45309; border: 0; color: #fff; padding: 6px 12px; border-radius: 6px; cursor: pointer; font: inherit; font-weight: 600; }
  .shadow-banner .enforce:hover { background: #92400e; }
  .rt .rt-site { font-weight: 600; color: #e6e8eb; padding-right: 10px; margin-right: 4px; border-right: 1px solid #313847; }
  .rt .live { display: inline-flex; align-items: center; gap: 7px; font-weight: 600; color: #e6e8eb; }
  .rt .pulse { width: 9px; height: 9px; border-radius: 50%; background: #34d399; box-shadow: 0 0 0 0 rgba(52,211,153,.6); animation: pulse 1.8s infinite; }
  @keyframes pulse { 70% { box-shadow: 0 0 0 7px rgba(52,211,153,0); } 100% { box-shadow: 0 0 0 0 rgba(52,211,153,0); } }
  .rt svg { display: block; }
  .chart-head { display: flex; align-items: center; gap: 12px; margin: 26px 0 10px; }
  .chart-head h2 { margin: 0; }
  .chart-ctrls { margin-left: auto; display: flex; gap: 8px; }
  .chart-ctrls select { background: #171a21; color: inherit; border: 1px solid #313847; border-radius: 6px; padding: 5px 8px; font: inherit; }
  .sec-head { display: flex; align-items: baseline; gap: 10px; margin: 26px 0 10px; }
  .sec-head h2 { margin: 0; }
  .all-btn { margin-left: auto; background: none; border: 0; color: #7ab3ff; font: inherit; font-size: 12.5px; cursor: pointer; padding: 2px 4px; }
  .all-btn:hover { text-decoration: underline; }
  .filters { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin: 4px 0 2px; }
  .filters:empty { display: none; }
  .chip { display: inline-flex; align-items: center; gap: 7px; background: #1c2431; border: 1px solid #2f3a4d; color: #cdd6e2; border-radius: 14px; padding: 3px 6px 3px 11px; font-size: 12.5px; }
  .chip b { font-weight: 600; color: #e6e8eb; }
  .chip .x { background: #313d50; border: 0; color: #cdd6e2; width: 17px; height: 17px; border-radius: 50%; cursor: pointer; line-height: 1; font-size: 13px; padding: 0; }
  .chip .x:hover { background: #47566e; color: #fff; }
  .filters .clear { background: none; border: 0; color: #8b93a1; font: inherit; font-size: 12px; cursor: pointer; text-decoration: underline; }
</style>
</head>
<body>
<header>
  <a href="/sites.html">← sites</a>
  <div class="switcher" id="switcher">
    <button class="title-btn" id="titleBtn" aria-haspopup="listbox" aria-expanded="false">
      <span id="titleText">…</span><span class="caret">▾</span>
    </button>
    <div class="switch-pop" id="switchPop" hidden>
      <input id="switchSearch" type="text" placeholder="Search sites…" autocomplete="off" aria-label="Search sites">
      <ul id="switchList" role="listbox"></ul>
    </div>
  </div>
  <select id="period" aria-label="Date range">
    <optgroup label="Rolling">
      <option value="24h">Last 24 hours</option>
      <option value="today" selected>Today</option>
      <option value="7d">Last 7 days</option>
      <option value="30d">Last 30 days</option>
      <option value="90d">Last 90 days</option>
    </optgroup>
    <optgroup label="Calendar">
      <option value="yesterday">Yesterday</option>
      <option value="this_week">This week</option>
      <option value="last_week">Last week</option>
      <option value="this_month">This month</option>
      <option value="last_month">Last month</option>
      <option value="this_year">This year</option>
    </optgroup>
  </select>
</header>
<main>
  <div class="rt" id="realtime"></div>
  <div class="shadow-banner" id="shadowBanner" hidden></div>
  <div class="filters" id="filters"></div>
  <div class="cards" id="cards"></div>

  <div class="chart-head">
    <h2 id="chartTitle">Pageviews</h2>
    <div class="chart-ctrls">
      <select id="metric" aria-label="Metric"></select>
      <select id="interval" aria-label="Interval"></select>
    </div>
  </div>
  <div class="panel" id="chart"></div>

  <div class="grid2">
    <div><div class="sec-head"><h2>Top sources</h2><button class="all-btn" data-all="source">All sources →</button></div><div class="panel" id="sources"></div></div>
    <div><div class="sec-head"><h2>Top pages</h2><button class="all-btn" data-all="page">All pages →</button></div><div class="panel" id="pages"></div></div>
  </div>
  <div class="grid2">
    <div><div class="sec-head"><h2>Countries</h2><button class="all-btn" data-all="country">All countries →</button></div><div class="panel" id="countries"></div></div>
    <div><div class="sec-head"><h2>Devices</h2><button class="all-btn" data-all="device">All devices →</button></div><div class="panel" id="devices"></div></div>
  </div>

  <div class="chart-head">
    <h2>Campaigns (UTM)</h2>
    <div class="chart-ctrls">
      <select id="utmDim" aria-label="UTM dimension">
        <option value="utm_campaign">Campaign</option>
        <option value="utm_medium">Medium</option>
        <option value="utm_term">Term</option>
        <option value="utm_content">Content</option>
        <option value="ft_source">First-touch source</option>
        <option value="ft_medium">First-touch medium</option>
        <option value="ft_campaign">First-touch campaign</option>
      </select>
    </div>
  </div>
  <div class="panel" id="utm"></div>

  <h2>Traffic quality</h2>
  <div class="grid2">
    <div class="panel" id="quality"></div>
    <div class="panel" id="flags"></div>
  </div>

  <h2>High-score traffic (drill-down)</h2>
  <div class="panel" id="traffic"></div>
</main>

<div class="modal" id="modal" hidden>
  <div class="modal-box">
    <div class="modal-head"><b id="modalTitle"></b><button class="modal-x" id="modalClose" aria-label="Close">×</button></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>
<script>
const site = new URLSearchParams(location.search).get('id');
if (!site) location.href = '/sites.html';
let siteName = site; // replaced with the friendly name once /api/sites loads
let brandName = 'pvuv.ai'; // instance brand (configurable), for the tab title suffix
const PREF_KEY = 'pvuv.chartPrefs';
const FILTER_KEY = 'pvuv.filters.' + site;

// ── faceted filtering (Plausible-style): click any dimension value to narrow
// the whole dashboard; filters stack (AND), one per dimension. Persisted per
// site so a reload keeps the view. Only cleanly-supported dims are clickable.
let filters = [];
const FILTER_UI = new Set(['source', 'page', 'country', 'device', 'utm_campaign', 'utm_medium']);
const FILTER_LABEL = { source: 'Source', page: 'Page', country: 'Country', device: 'Device', utm_campaign: 'Campaign', utm_medium: 'Medium' };
function loadFilters() {
  try { filters = JSON.parse(localStorage.getItem(FILTER_KEY)) || []; } catch { filters = []; }
  if (!Array.isArray(filters)) filters = [];
}
function saveFilters() { try { localStorage.setItem(FILTER_KEY, JSON.stringify(filters)); } catch { /* non-fatal */ } }
function filterQS() { return filters.length ? `&filters=${encodeURIComponent(JSON.stringify(filters))}` : ''; }
function addFilter(dim, value) {
  if (!FILTER_UI.has(dim) || value == null) return;
  value = String(value);
  if (filters.some((f) => f.dim === dim && f.value === value)) return;
  filters = filters.filter((f) => f.dim !== dim); // one filter per dimension
  filters.push({ dim, value });
  saveFilters(); renderFilters(); load();
}
function removeFilter(i) { filters.splice(i, 1); saveFilters(); renderFilters(); load(); }
function clearFilters() { filters = []; saveFilters(); renderFilters(); load(); }
function renderFilters() {
  const el = document.getElementById('filters');
  el.innerHTML = filters.map((f, i) =>
    `<span class="chip"><span>${esc(FILTER_LABEL[f.dim] || f.dim)}: <b>${esc(f.value)}</b></span><button class="x" data-i="${i}" aria-label="Remove filter" title="Remove">×</button></span>`).join('')
    + (filters.length > 1 ? '<button class="clear">Clear all</button>' : '');
  el.querySelectorAll('.chip .x').forEach((b) => b.addEventListener('click', () => removeFilter(Number(b.dataset.i))));
  const c = el.querySelector('.clear');
  if (c) c.addEventListener('click', clearFilters);
}

// browser-tab title: "{metric} - {site} - {brand}" so tabs are distinguishable.
function setTitle() {
  const m = document.getElementById('metric');
  const label = m && m.value ? (METRIC_LABEL[m.value] || '') : '';
  document.title = `${label ? label + ' - ' : ''}${siteName} - ${brandName}`;
}
async function loadBrand() {
  try { const b = await (await fetch('/api/home')).json(); if (b && b.name) brandName = b.name; } catch { /* keep default */ }
  setTitle();
}
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmt = (n) => n == null ? '–' : Number(n).toLocaleString('en-US');
const dur = (ms) => ms == null ? '–' : ms >= 60000 ? `${Math.floor(ms/60000)}m ${Math.round(ms%60000/1000)}s` : `${Math.round(ms/1000)}s`;
async function guard(r) { if (r.status === 401) { location.href = '/login.html'; throw new Error('auth'); } return r; }
const get = async (p, qs = '') =>
  (await guard(await fetch(`/api/sites/${site}/${p}?period=${document.getElementById('period').value}${qs}${filterQS()}`))).json();

// mirrors shared/flags.ts bit definitions (evidence labels, §11.2)
const FLAG_LABELS = {
  0x0001: 'webdriver', 0x0002: 'automation residue', 0x0004: 'UA/env contradiction',
  0x0008: 'datacenter ASN', 0x0010: 'Sec-Fetch missing', 0x0020: 'timezone/IP mismatch',
  0x0040: 'no interaction & no leave', 0x0080: 'software WebGL', 0x0100: 'mechanical timing',
  0x0200: 'blocklisted cluster', 0x0400: 'honeypot', 0x0800: 'screen/device contradiction',
  0x1000: 'no motion data (Android)', 0x2000: 'motion perfectly static',
};
const flagNames = (bits) => Object.keys(FLAG_LABELS).filter((b) => bits & b).map((b) => FLAG_LABELS[b]);

// Plain-English names + one-line explanations for the fired-signal panel — the
// raw enum names (TZ_IP_MISMATCH …) mean nothing to a site owner. Keyed by the
// FlagName the /quality endpoint returns.
const SIGNAL_INFO = {
  WEBDRIVER: ['Automated browser', 'Reports navigator.webdriver — a real automation/headless browser'],
  AUTOMATION_RESIDUE: ['Automation tool traces', 'Globals left behind by PhantomJS / Selenium-style tools'],
  UA_CH_MISMATCH: ['Browser identity mismatch', 'The declared browser contradicts its own capabilities'],
  DATACENTER_ASN: ['Datacenter / hosting network', 'Request came from a server network, not a home/mobile ISP'],
  SEC_FETCH_MISSING: ['Missing security headers', 'Real browsers send Sec-Fetch-* headers; these did not'],
  TZ_IP_MISMATCH: ['Timezone ≠ location', "Browser timezone doesn't match the IP's country"],
  ZERO_INTERACTION_NO_LEAVE: ['No interaction at all', 'No clicks, scroll, or page-leave — nobody was really there'],
  SOFTWARE_WEBGL: ['No real GPU', 'Graphics rendered in software (SwiftShader/llvmpipe) — typical of bots'],
  MECHANICAL_TIMING: ['Machine-like timing', 'Events spaced too evenly to be human'],
  BLOCKLIST_CLUSTER: ['Known bad cluster', 'Matches a fingerprint/IP group flagged by batch analysis'],
  HONEYPOT: ['Fell for a hidden trap', 'Followed an invisible link no human can see'],
  SCREEN_DEVICE_MISMATCH: ['Fake screen / device', 'Impossible screen size or device characteristics'],
  MOBILE_NO_MOTION: ['Mobile without sensors', 'Claims to be a phone but reports no motion sensors'],
  MOTION_STATIC: ['Frozen motion sensors', 'Motion readings never change — a spoofed device'],
};
const signalLabel = (name) => (SIGNAL_INFO[name] || [name.toLowerCase().replace(/_/g, ' '), ''])[0];
const signalHelp = (name) => (SIGNAL_INFO[name] || ['', ''])[1];

// Clickable breakdown table: each row adds a filter for `dim` (Plausible-style).
// A trailing "+filter" hint appears on hover for filterable dims.
function renderBreakdown(elId, dim, headers, rows, valueOf, cellsOf) {
  const el = document.getElementById(elId);
  const clickable = FILTER_UI.has(dim);
  el.innerHTML = rows.length
    ? `<table><tr>${headers.map((h, i) => `<th${i ? ' class="num"' : ''}>${h}</th>`).join('')}</tr>`
      + rows.map((r, idx) => `<tr${clickable ? ' class="clickable"' : ''} data-i="${idx}">${cellsOf(r).map((c, i) => `<td${i ? ' class="num"' : ''}>${i === 0 && clickable ? `${c} <span class="drill">+ filter</span>` : c}</td>`).join('')}</tr>`).join('') + '</table>'
    : '<p class="muted">no data yet</p>';
  if (clickable) el.querySelectorAll('tr.clickable').forEach((tr) =>
    tr.addEventListener('click', () => addFilter(dim, valueOf(rows[Number(tr.dataset.i)]))));
}

// "All sources / pages / …" — full (top-100) breakdown for a dimension in the
// modal. Rows are clickable to add a filter (see faceted filtering below).
const ALL_META = {
  source:  { title: 'All sources',   head: ['Source', 'Sessions', 'PV', 'PV clean', 'Visitors'], cols: (r) => [esc(r.key), fmt(r.sessions), fmt(r.pv), fmt(r.pv_clean), fmt(r.uv)], val: (r) => r.key },
  page:    { title: 'All pages',      head: ['Path', 'PV', 'PV clean', 'Visitors', 'Bounces'],   cols: (r) => [esc(r.path), fmt(r.pv), fmt(r.pv_clean), fmt(r.uv), fmt(r.bounces)], val: (r) => r.path },
  country: { title: 'All countries',  head: ['Country', 'PV', 'PV clean', 'Visitors'],           cols: (r) => [esc(r.key), fmt(r.pv), fmt(r.pv_clean), fmt(r.uv)], val: (r) => r.key },
  device:  { title: 'All devices',    head: ['Device', 'PV', 'PV clean', 'Visitors'],            cols: (r) => [esc(r.key), fmt(r.pv), fmt(r.pv_clean), fmt(r.uv)], val: (r) => r.key },
};
async function openAll(dim) {
  const m = ALL_META[dim];
  if (!m) return;
  document.getElementById('modalTitle').textContent = m.title;
  document.getElementById('modalBody').innerHTML = '<p class="muted">loading…</p>';
  document.getElementById('modal').hidden = false;
  const d = await get('breakdown', `&dim=${dim}&limit=100`);
  const rows = d.rows || [];
  document.getElementById('modalBody').innerHTML = rows.length
    ? `<table><tr>${m.head.map((h, i) => `<th${i ? ' class="num"' : ''}>${h}</th>`).join('')}</tr>`
      + rows.map((r, idx) => `<tr class="clickable" data-i="${idx}">${m.cols(r).map((c, i) => `<td${i ? ' class="num"' : ''}>${c}</td>`).join('')}</tr>`).join('') + '</table>'
      + '<p class="muted" style="font-size:12px;margin:10px 2px 0">Click a row to filter the dashboard by it.</p>'
    : '<p class="muted">no data yet</p>';
  document.getElementById('modalBody').querySelectorAll('tr.clickable').forEach((tr) => tr.addEventListener('click', () => {
    const r = rows[Number(tr.dataset.i)];
    addFilter(dim, m.val(r)); closeModal();
  }));
}
document.querySelectorAll('.all-btn').forEach((b) => b.addEventListener('click', () => openAll(b.dataset.all)));

function closeModal() { document.getElementById('modal').hidden = true; }
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', (e) => { if (e.target.id === 'modal') closeModal(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

// metric + interval controls (Plausible-style). First interval per period = default.
const METRICS = [
  ['pv', 'Pageviews'], ['uv', 'Visitors'], ['sessions', 'Sessions'],
  ['pv_per_visitor', 'Pages / visitor'],
  ['bounce_rate', 'Bounce rate (engaged)'], ['bounce_rate_single', 'Bounce rate (1-page)'],
  ['avg_duration_ms', 'Engaged time'], ['visit_duration_ms', 'Visit duration'],
];
const METRIC_LABEL = Object.fromEntries(METRICS);
const INTERVALS = {
  '24h': ['hour', 'minute'],
  today: ['hour', 'minute'], yesterday: ['hour', 'minute'],
  '7d': ['day', 'hour'], this_week: ['day', 'hour'], last_week: ['day', 'hour'],
  '30d': ['day', 'week'], this_month: ['day', 'week'], last_month: ['day', 'week'], '90d': ['day', 'week'],
  this_year: ['month', 'week', 'day'],
};
const INTERVAL_LABEL = { minute: 'Minutes', hour: 'Hours', day: 'Days', week: 'Weeks', month: 'Months' };

function fmtMetric(metric, v) {
  if (v == null) return '–';
  if (metric === 'bounce_rate' || metric === 'bounce_rate_single') return (v * 100).toFixed(1) + '%';
  if (metric === 'avg_duration_ms' || metric === 'visit_duration_ms') return dur(v);
  if (metric === 'pv_per_visitor') return Number(v).toFixed(2);
  return fmt(v);
}

// Pick a "nice" axis top + gridline step so the max sits just under a round
// number and lines land on 1/2/5×10ⁿ values (462 → top 500 step 100; a few
// thousand → step 500 or 1000). Targets ~5 gridlines.
function niceScale(max) {
  if (!(max > 0)) return { top: 1, step: 1 };
  const raw = max / 5;                             // aim for ~5 intervals
  const pow = Math.pow(10, Math.floor(Math.log10(raw)));
  const frac = raw / pow;
  const nice = frac <= 1 ? 1 : frac <= 2 ? 2 : frac <= 5 ? 5 : 10;
  const step = nice * pow;
  return { top: Math.ceil(max / step) * step, step };
}

function lineChart(points, metric) {
  const el = document.getElementById('chart');
  // future buckets (time hasn't arrived) are never drawn — otherwise the line
  // would dive to 0 and look like missing data. The in-progress bucket (status
  // 'partial') is drawn with a dashed connector to show it's still filling.
  const drawn = points.filter((p) => p.status !== 'future');
  const hasData = drawn.some((p) => p.value != null && p.value !== 0);
  if (!drawn.length || !hasData) { el.innerHTML = '<p class="muted">no data yet</p>'; return; }
  const W = 980, H = 190, P = 46, PT = 12;
  const max = Math.max(...drawn.map((p) => p.value ?? 0), 1);
  const { top, step } = niceScale(max);
  // x spans the full range (axis shows the whole period); future area stays empty
  const xs = (i) => P + (i * (W - P - 12)) / Math.max(points.length - 1, 1);
  const ys = (v) => H - P - ((v ?? 0) * (H - P - PT)) / top;

  // horizontal gridlines + left-axis value labels at each nice step
  const grid = [];
  for (let g = 0; g <= top + 1e-9; g += step) {
    const y = ys(g).toFixed(1);
    grid.push(`<line x1="${P}" y1="${y}" x2="${W - 12}" y2="${y}" stroke="#222834" stroke-width="1"/>`
      + `<text x="${P - 8}" y="${(Number(y) + 3.5).toFixed(1)}" text-anchor="end">${esc(fmtMetric(metric, g))}</text>`);
  }

  const complete = points.map((p, i) => ({ p, i })).filter((x) => x.p.status === 'complete');
  const solid = complete.map((x) => `${xs(x.i).toFixed(1)},${ys(x.p.value).toFixed(1)}`).join(' ');
  const partialIdx = points.findIndex((p) => p.status === 'partial');
  let dashed = '';
  if (partialIdx >= 0) {
    const prev = complete.length ? complete[complete.length - 1].i : partialIdx;
    dashed = `${xs(prev).toFixed(1)},${ys(points[prev].value).toFixed(1)} ${xs(partialIdx).toFixed(1)},${ys(points[partialIdx].value).toFixed(1)}`;
  }

  const dot = (p, i) => p.status === 'future' ? '' :
    `<circle cx="${xs(i).toFixed(1)}" cy="${ys(p.value).toFixed(1)}" r="2.5" fill="${p.status === 'partial' ? '#0f1115' : '#3b82f6'}" stroke="#3b82f6" stroke-width="${p.status === 'partial' ? 1.5 : 0}"><title>${esc(p.label)}: ${fmtMetric(metric, p.value)}${p.status === 'partial' ? ' (in progress)' : ''}</title></circle>`;
  const lstep = Math.ceil(points.length / 8);
  const labels = points.filter((_, i) => i % lstep === 0);
  el.innerHTML = `<svg viewBox="0 0 ${W} ${H}" style="width:100%">
    ${grid.join('')}
    ${solid ? `<polyline points="${solid}" fill="none" stroke="#3b82f6" stroke-width="2"/>` : ''}
    ${dashed ? `<polyline points="${dashed}" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4 3" opacity="0.75"/>` : ''}
    ${points.map(dot).join('')}
    ${labels.map((p) => `<text x="${xs(points.indexOf(p))}" y="${H - 6}" text-anchor="middle" ${p.status === 'future' ? 'opacity="0.4"' : ''}>${esc(p.label)}</text>`).join('')}
  </svg>`;
}

function populateControls() {
  const mSel = document.getElementById('metric');
  if (!mSel.options.length) mSel.innerHTML = METRICS.map(([v, l]) => `<option value="${v}">${l}</option>`).join('');
  const period = document.getElementById('period').value;
  const opts = INTERVALS[period] || ['day'];
  const iSel = document.getElementById('interval');
  const cur = iSel.value;
  iSel.innerHTML = opts.map((v) => `<option value="${v}">${INTERVAL_LABEL[v]}</option>`).join('');
  iSel.value = opts.includes(cur) ? cur : opts[0]; // keep choice if still valid, else default
}

// KPI cards. The two bounce definitions are shown as separate cards (more
// direct than a toggle): "engaged" = GA4 style, "1-page" = UA/Plausible/Similarweb.
function renderCards(o) {
  const cleanShare = (o.pv ? ((o.clean_count + o.suspect_count) / o.pv) * 100 : 0).toFixed(1);
  const perVisitor = o.uv ? (o.pv / o.uv).toFixed(2) : '–';
  const pct = (v) => v == null ? '–' : (v * 100).toFixed(1) + '%';
  const card = (k, v, h) => `<div class="card"><div class="v">${v}</div><div class="k">${k}</div>${h ? `<div class="h">${h}</div>` : ''}</div>`;
  document.getElementById('cards').innerHTML =
    card('Visitors', fmt(o.uv)) + card('Sessions', fmt(o.sessions)) + card('Pageviews', fmt(o.pv)) +
    card('Pages / visitor', perVisitor) +
    card('Bounce rate (engaged)', pct(o.bounce_rate), 'GA4 engagement metric') +
    card('Bounce rate (1-page)', pct(o.bounce_rate_single), 'UA / Plausible style') +
    card('Engaged time', dur(o.avg_duration_ms), 'Visible dwell, incl. exit page') +
    card('Visit duration', dur(o.visit_duration_ms), 'UA / Plausible style') +
    card('Human share', cleanShare + '%');
}

async function loadChart() {
  const metric = document.getElementById('metric').value;
  const interval = document.getElementById('interval').value;
  document.getElementById('chartTitle').textContent = METRIC_LABEL[metric];
  setTitle(); // reflect the selected metric in the tab title
  const ts = await get('timeseries', `&metric=${metric}&interval=${interval}`);
  lineChart(ts.points, metric);
}

function donut(t) {
  const total = t.clean + t.suspect + t.bot + t.crawler || 1;
  const colors = { clean: '#34d399', suspect: '#fbbf24', bot: '#f87171', crawler: '#64748b' };
  let off = 0;
  const C = 2 * Math.PI * 40;
  const segs = Object.keys(colors).map((k) => {
    const frac = t[k] / total;
    const seg = `<circle r="40" cx="60" cy="60" fill="none" stroke="${colors[k]}" stroke-width="16"
      stroke-dasharray="${(frac * C).toFixed(1)} ${C.toFixed(1)}" stroke-dashoffset="${(-off * C).toFixed(1)}"
      transform="rotate(-90 60 60)"/>`;
    off += frac;
    return seg;
  }).join('');
  document.getElementById('quality').innerHTML = `
    <div style="display:flex;gap:20px;align-items:center">
      <svg viewBox="0 0 120 120" width="130">${segs}
        <text x="60" y="58" text-anchor="middle" style="font-size:15px;fill:#e6e8eb;font-weight:700">${((t.clean + t.suspect) / total * 100).toFixed(1)}%</text>
        <text x="60" y="74" text-anchor="middle">counted</text></svg>
      <div class="legend" style="flex-direction:column;align-items:flex-start">
        <span><i class="dot" style="background:#34d399"></i>clean ${fmt(t.clean)}</span>
        <span><i class="dot" style="background:#fbbf24"></i>suspect ${fmt(t.suspect)} <span class="muted">(counted, flagged)</span></span>
        <span><i class="dot" style="background:#f87171"></i>bot ${fmt(t.bot)} <span class="muted">(excluded)</span></span>
        <span><i class="dot" style="background:#64748b"></i>verified crawler ${fmt(t.crawler)} <span class="muted">(separate)</span></span>
      </div>
    </div>`;
}

async function load() {
  const ov = await get('overview');
  renderCards(ov);
  renderShadowBanner(ov);
  await loadChart();

  const sources = await get('breakdown', '&dim=source');
  renderBreakdown('sources', 'source', ['Source', 'Sessions', 'PV', 'PV clean', 'Visitors'],
    sources.rows, (r) => r.key, (r) => [esc(r.key), fmt(r.sessions), fmt(r.pv), fmt(r.pv_clean), fmt(r.uv)]);

  const pages = await get('breakdown', '&dim=page');
  renderBreakdown('pages', 'page', ['Path', 'PV', 'PV clean', 'Visitors', 'Bounces'],
    pages.rows, (r) => r.path, (r) => [esc(r.path), fmt(r.pv), fmt(r.pv_clean), fmt(r.uv), fmt(r.bounces)]);

  const countries = await get('breakdown', '&dim=country');
  renderBreakdown('countries', 'country', ['Country', 'PV', 'PV clean', 'Visitors'],
    countries.rows, (r) => r.key, (r) => [esc(r.key), fmt(r.pv), fmt(r.pv_clean), fmt(r.uv)]);

  const devices = await get('breakdown', '&dim=device');
  renderBreakdown('devices', 'device', ['Device', 'PV', 'PV clean', 'Visitors'],
    devices.rows, (r) => r.key, (r) => [esc(r.key), fmt(r.pv), fmt(r.pv_clean), fmt(r.uv)]);

  await loadUtm();

  const qy = await get('quality');
  donut(qy.totals);
  const firedFlags = Object.entries(qy.flags).filter(([, n]) => n > 0).sort((a, b) => b[1] - a[1]);
  document.getElementById('flags').innerHTML = firedFlags.length
    ? '<p class="muted" style="margin:0 0 10px;font-size:12px">Bot-detection checks that fired on suspicious traffic — one visit can trip several.</p>'
      + '<table><tr><th>Signal</th><th class="num">Events</th></tr>' +
      firedFlags.map(([k, n]) => `<tr><td title="${esc(signalHelp(k))}">${esc(signalLabel(k))}</td><td class="num">${fmt(n)}</td></tr>`).join('') + '</table>'
    : '<p class="muted">no signals fired — traffic looks clean</p>';

  // high-score drill-down, aggregated by VISITOR (one row per suspicious visitor,
  // not per event): event/session counts, worst score/verdict, union of evidence.
  const tr = await get('traffic', '&min_score=30&limit=50');
  document.getElementById('traffic').innerHTML = tr.rows.length
    ? '<table><tr><th>Visitor</th><th class="num">Events</th><th class="num">Sessions</th><th>Last seen</th><th>Where</th><th>Agent</th><th class="num">Max score</th><th>Verdict</th><th>Evidence</th></tr>' +
      tr.rows.map((r) => `<tr>
        <td class="muted" title="${esc(r.visitor_id)}">${esc(String(r.visitor_id).slice(0, 10))}…</td>
        <td class="num">${fmt(r.events)}</td>
        <td class="num">${fmt(r.sessions)}</td>
        <td>${new Date(r.last_ts).toISOString().slice(5, 16).replace('T', ' ')}</td>
        <td>${esc(r.country ?? '–')}${r.asn_type === 'datacenter' ? ' · DC' : ''}</td>
        <td>${esc(r.browser ?? '–')}/${esc(r.os ?? '–')}</td>
        <td class="num">${r.bot_score}</td>
        <td><span class="badge b-${esc(r.verdict)}">${esc(r.verdict)}</span></td>
        <td class="flags">${flagNames(r.bot_flags).map(esc).join(', ') || '–'}</td>
      </tr>`).join('') + '</table>'
    : '<p class="muted">nothing above the threshold — looking clean</p>';
}

// live "online now" — polls independently of the selected period (always the
// last 30 minutes), so the header updates without reloading the whole page.
function sparkline(minutes) {
  const w = 90, h = 20, n = minutes.length, max = Math.max(...minutes, 1);
  const pts = minutes.map((v, i) => `${(i * w / Math.max(n - 1, 1)).toFixed(1)},${(h - 2 - v * (h - 4) / max).toFixed(1)}`).join(' ');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline points="${pts}" fill="none" stroke="#34d399" stroke-width="1.5"/></svg>`;
}
async function pollRealtime() {
  try {
    const r = await fetch(`/api/sites/${site}/realtime`);
    if (r.status === 401) { location.href = '/login.html'; return; }
    const d = await r.json();
    document.getElementById('realtime').innerHTML =
      `<span class="rt-site">${esc(siteName)}</span>` +
      `<span class="live"><span class="pulse"></span>${fmt(d.online)} online now</span>` +
      `<span class="muted">${fmt(d.pageviews)} views in last ${d.window_minutes}m</span>` +
      sparkline(d.minutes || []);
  } catch { /* transient — keep the last value */ }
}

// remember the last period / metric / interval across refreshes (localStorage)
function savePrefs() {
  try {
    localStorage.setItem(PREF_KEY, JSON.stringify({
      period: document.getElementById('period').value,
      metric: document.getElementById('metric').value,
      interval: document.getElementById('interval').value,
    }));
  } catch { /* storage unavailable — non-fatal */ }
}
function restorePrefs() {
  let p = {};
  try { p = JSON.parse(localStorage.getItem(PREF_KEY)) || {}; } catch { p = {}; }
  const has = (sel, v) => v && [...sel.options].some((o) => o.value === v);
  const periodSel = document.getElementById('period');
  if (has(periodSel, p.period)) periodSel.value = p.period; // else HTML default (today)
  populateControls();                                       // fills metric + interval opts
  const mSel = document.getElementById('metric'), iSel = document.getElementById('interval');
  if (has(mSel, p.metric)) mSel.value = p.metric;
  if (has(iSel, p.interval)) iSel.value = p.interval;
}

// fetch the owner's sites: names the header/realtime row + powers the switcher
let allSites = [];
let siteDomainPrimary = ''; // this site's first allowed domain (for the Google-search helper)
let siteShadowUntil = 0;    // record-only until this instant (0 = enforcing)
async function loadSiteName() {
  try {
    const { sites } = await (await guard(await fetch('/api/sites'))).json();
    allSites = sites || [];
    const s = allSites.find((x) => x.site_id === site);
    if (s) { if (s.name) siteName = s.name; siteDomainPrimary = siteDomain(s); siteShadowUntil = s.shadow_until || 0; }
  } catch { /* fall back to the id */ }
  document.getElementById('titleText').textContent = siteName;
  setTitle();
}

// shadow mode (§7): while record-only, ads still load — show days left + the
// backtested "would block X%" over the selected period, and an Enforce-now button.
function renderShadowBanner(o) {
  const el = document.getElementById('shadowBanner');
  const now = Date.now();
  if (!siteShadowUntil || now >= siteShadowUntil) { el.hidden = true; return; }
  const days = Math.ceil((siteShadowUntil - now) / 86400000);
  const blocked = o && o.pv ? (((o.pv - o.clean_count) / o.pv) * 100).toFixed(1) : '0.0';
  el.hidden = false;
  el.innerHTML = `<span><b>Shadow mode</b> — recording only, ads still load for <b>${days}</b> more day${days === 1 ? '' : 's'}. At the current tier, <b>${blocked}%</b> of pageviews in this range would be blocked once enforcing.</span>`
    + '<button id="enforceBtn" class="enforce">Enforce now</button>';
  document.getElementById('enforceBtn').addEventListener('click', async () => {
    if (!confirm('Start blocking ads for suspected invalid traffic now? This ends the record-only window and can\'t be undone.')) return;
    const r = await guard(await fetch(`/api/sites/${site}/enforce`, { method: 'POST' }));
    if (r.ok) { siteShadowUntil = 0; el.hidden = true; }
  });
}

// ── site switcher: click the name → searchable dropdown to jump to another site
function siteDomain(s) { try { return (JSON.parse(s.allowed_domains || '[]')[0]) || ''; } catch { return ''; } }
function renderSwitchList(filter) {
  const f = (filter || '').trim().toLowerCase();
  const items = allSites.filter((s) => !f
    || (s.name || '').toLowerCase().includes(f)
    || s.site_id.toLowerCase().includes(f)
    || siteDomain(s).toLowerCase().includes(f));
  const ul = document.getElementById('switchList');
  ul.innerHTML = items.length
    ? items.map((s, i) => `<li role="option" data-id="${esc(s.site_id)}" class="${s.site_id === site ? 'current' : ''}${i === 0 ? ' active' : ''}">
        <span class="nm">${esc(s.name || s.site_id)}</span>${siteDomain(s) ? `<span class="dm">${esc(siteDomain(s))}</span>` : ''}</li>`).join('')
    : '<div class="none">No sites found</div>';
  ul.querySelectorAll('li').forEach((li) => li.addEventListener('click', () => gotoSite(li.dataset.id)));
}
function gotoSite(id) {
  if (id && id !== site) location.href = '/site.html?id=' + encodeURIComponent(id);
  else closeSwitch();
}
function openSwitch() {
  const pop = document.getElementById('switchPop');
  pop.hidden = false;
  document.getElementById('titleBtn').setAttribute('aria-expanded', 'true');
  const s = document.getElementById('switchSearch');
  s.value = ''; renderSwitchList(''); s.focus();
}
function closeSwitch() {
  document.getElementById('switchPop').hidden = true;
  document.getElementById('titleBtn').setAttribute('aria-expanded', 'false');
}
function moveActive(delta) {
  const lis = [...document.querySelectorAll('#switchList li')];
  if (!lis.length) return;
  let idx = lis.findIndex((li) => li.classList.contains('active'));
  if (idx >= 0) lis[idx].classList.remove('active');
  idx = ((idx < 0 ? 0 : idx) + delta + lis.length) % lis.length;
  lis[idx].classList.add('active');
  lis[idx].scrollIntoView({ block: 'nearest' });
}
document.getElementById('titleBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  document.getElementById('switchPop').hidden ? openSwitch() : closeSwitch();
});
document.getElementById('switchSearch').addEventListener('input', (e) => renderSwitchList(e.target.value));
document.getElementById('switchSearch').addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { closeSwitch(); document.getElementById('titleBtn').focus(); }
  else if (e.key === 'ArrowDown') { e.preventDefault(); moveActive(1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); moveActive(-1); }
  else if (e.key === 'Enter') { const a = document.querySelector('#switchList li.active'); if (a) gotoSite(a.dataset.id); }
});
document.addEventListener('click', (e) => { if (!document.getElementById('switcher').contains(e.target)) closeSwitch(); });

async function loadUtm() {
  const dim = document.getElementById('utmDim').value;
  const label = dim.startsWith('ft_') ? 'First-touch' : 'Value';
  const d = await get('breakdown', `&dim=${dim}`);
  // rows are clickable-to-filter only for the fully-supported UTM dims
  // (utm_campaign / utm_medium); the rest render as a plain table.
  renderBreakdown('utm', dim, [label, 'PV', 'PV clean', 'Visitors'],
    d.rows, (r) => r.key, (r) => [esc(r.key), fmt(r.pv), fmt(r.pv_clean), fmt(r.uv)]);
}
document.getElementById('utmDim').addEventListener('change', loadUtm);
document.getElementById('period').addEventListener('change', () => { populateControls(); savePrefs(); load(); });
document.getElementById('metric').addEventListener('change', () => { savePrefs(); loadChart(); });
document.getElementById('interval').addEventListener('change', () => { savePrefs(); loadChart(); });

restorePrefs();
loadFilters();
renderFilters();
// load the site meta (name, domain, shadow_until) before the first render so the
// header and shadow banner are correct on first paint
loadBrand();
(async () => { await loadSiteName(); load(); pollRealtime(); })();
setInterval(pollRealtime, 15000);
</script>
